body {
    background-color: #0d1117; /* GitHub Dark Theme */
    color: #58a6ff; /* Arda'nin Mavi-Gri tonu */
    font-family: 'Courier New', Courier, monospace;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100vh;
    margin: 0;
}

.container {
    border: 1px solid #30363d;
    padding: 40px;
    border-radius: 10px;
    background: #161b22;
    box-shadow: 0 0 20px rgba(88, 166, 255, 0.2);
}

h1 { color: #ffffff; border-bottom: 2px solid #58a6ff; padding-bottom: 10px; }

.btn {
    background-color: #238636;
    color: white;
    padding: 10px 20px;
    text-decoration: none;
    border-radius: 5px;
    font-weight: bold;
}

.btn:hover { background-color: #2ea043; }
